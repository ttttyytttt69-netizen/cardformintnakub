<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>การ์ดลับสำหรับพรนี้</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { background: #0a1628; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .card-container { width: 360px; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

  /* LOCK */
  #lock-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 460px; padding: 2.5rem 2rem;
    background: linear-gradient(135deg, #b3d9ff 0%, #e0f0ff 60%, #cce8ff 100%);
    position: relative; overflow: hidden;
  }
  #lock-screen::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 80%, rgba(100,180,255,0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(180,220,255,0.3) 0%, transparent 50%);
  }
  .lock-icon { font-size: 52px; margin-bottom: 12px; position: relative; }
  .lock-title { font-size: 18px; font-weight: 600; color: #1a5a8a; margin-bottom: 4px; position: relative; }
  .lock-sub { font-size: 13px; color: #3a7ab0; margin-bottom: 24px; position: relative; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 24px; position: relative; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.4); border: 2px solid #4a90c0; transition: background 0.2s; }
  .pin-dot.filled { background: #1a6fbf; }
  .keypad { display: grid; grid-template-columns: repeat(3, 68px); gap: 12px; position: relative; }
  .key {
    width: 68px; height: 68px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.75); color: #1a5a8a; font-size: 22px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
  }
  .key:hover { background: rgba(255,255,255,0.95); }
  .key:active { transform: scale(0.92); background: #b3d9ff; }
  #error-msg { color: #c0392b; font-size: 13px; margin-top: 10px; position: relative; min-height: 20px; }

  /* CARD */
  #card-wrap {
    display: none; position: relative; overflow: hidden;
    background: linear-gradient(145deg, #0d6ebd 0%, #1890e0 40%, #0a4f90 100%);
  }
  #card-wrap.show { display: block; animation: openCard 0.6s ease-out forwards; }
  .card-inner { position: relative; padding-bottom: 20px; }

  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle 2s infinite alternate; }
  .sparkle-star {
    position: absolute; width: 6px; height: 6px; background: #fff;
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    animation: sparkle 1.5s infinite;
  }

  @keyframes twinkle { from { opacity: 0.3; transform: scale(0.7); } to { opacity: 1; transform: scale(1); } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes openCard { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
  @keyframes sparkle { 0%,100% { opacity: 0; transform: scale(0); } 50% { opacity: 1; transform: scale(1); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes musicPulse { 0%,100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }

  .animals-row { display: flex; justify-content: center; align-items: flex-end; padding-top: 32px; animation: fadeUp 0.8s 0.3s ease-out both; position: relative; z-index: 2; }
  .animal { font-size: 50px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25)); }
  .animal.f1 { animation: float 3s ease-in-out infinite; }
  .animal.f2 { animation: float 3s ease-in-out 0.5s infinite; }
  .animal.f3 { animation: float 3s ease-in-out 1s infinite; }

  .sparkle-row { text-align:center; margin-top:8px; animation: fadeUp 0.8s 0.4s ease-out both; position:relative; z-index:2; font-size:24px; }

  .msg-box {
    margin: 12px 18px 0; background: rgba(255,255,255,0.15); border-radius: 16px;
    padding: 18px; text-align: center; position: relative; z-index: 2;
    border: 1px solid rgba(255,255,255,0.3);
    animation: fadeUp 0.8s 0.5s ease-out both;
  }
  .msg-highlight { font-size: 19px; font-weight: 600; color: #ffef70; display: block; margin-bottom: 10px; text-shadow: 0 0 12px rgba(255,240,0,0.4); }
  .msg-body { color: #fff; font-size: 15px; line-height: 1.9; text-shadow: 0 1px 4px rgba(0,0,50,0.3); }
  .msg-accent { color: #ffe066; font-weight: 600; }
  .msg-small { font-size: 14px; color: rgba(255,255,255,0.88); }

  .music-bar {
    margin: 14px 18px 0; display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2; animation: fadeUp 0.8s 0.7s ease-out both; gap: 14px;
  }
  .play-btn {
    width: 48px; height: 48px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.9); color: #1a6fbf; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s; flex-shrink: 0;
  }
  .play-btn:hover { transform: scale(1.1); background: #fff; }
  .music-waves { display: flex; align-items: center; gap: 3px; height: 22px; }
  .wave-bar { width: 4px; background: rgba(255,255,255,0.7); border-radius: 2px; height: 100%; transform: scaleY(0.3); transition: transform 0.1s; }
  .wave-bar.active { animation: musicPulse 0.6s ease-in-out infinite; }
  .wave-bar:nth-child(2).active { animation-delay: 0.1s; }
  .wave-bar:nth-child(3).active { animation-delay: 0.2s; }
  .wave-bar:nth-child(4).active { animation-delay: 0.15s; }
  .wave-bar:nth-child(5).active { animation-delay: 0.05s; }

  .card-bottom { text-align:center; padding: 12px 0 4px; color: rgba(255,255,255,0.8); font-size: 13px; position:relative; z-index:2; animation: fadeUp 0.8s 0.9s ease-out both; }
</style>
</head>
<body>
<div class="card-container">

  <!-- LOCK SCREEN -->
  <div id="lock-screen">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">การ์ดลับสำหรับพรนี้</div>
    <div class="lock-sub">ใส่รหัส 4 หลักเพื่อเปิดการ์ด</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2</button>
      <button class="key" onclick="pressKey('3')">3</button>
      <button class="key" onclick="pressKey('4')">4</button>
      <button class="key" onclick="pressKey('5')">5</button>
      <button class="key" onclick="pressKey('6')">6</button>
      <button class="key" onclick="pressKey('7')">7</button>
      <button class="key" onclick="pressKey('8')">8</button>
      <button class="key" onclick="pressKey('9')">9</button>
      <button class="key" onclick="delKey()">⌫</button>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key" onclick="confirmPin()" style="background:rgba(26,111,191,0.35);color:#1a5a8a;">✓</button>
    </div>
    <div id="error-msg"></div>
  </div>

  <!-- CARD -->
  <div id="card-wrap">
    <div class="card-inner" id="card-inner"></div>
  </div>

</div>

<script>
let pin = '';
const correct = '0807';
let audioCtx = null;
let isPlaying = false;
let musicTimer = null;
let noteIdx = 0;

const melody = [
  {f:523,d:0.45},{f:587,d:0.45},{f:659,d:0.45},{f:698,d:0.65},
  {f:659,d:0.45},{f:587,d:0.45},{f:523,d:0.85},
  {f:494,d:0.45},{f:523,d:0.45},{f:587,d:0.45},{f:659,d:0.65},
  {f:587,d:0.45},{f:523,d:0.45},{f:494,d:0.85},
  {f:440,d:0.45},{f:494,d:0.45},{f:523,d:0.45},{f:587,d:0.65},
  {f:523,d:0.45},{f:494,d:0.45},{f:440,d:0.85},
  {f:392,d:0.45},{f:440,d:0.45},{f:494,d:0.45},{f:523,d:1.1}
];

function pressKey(k) {
  if (pin.length >= 4) return;
  pin += k; updateDots();
  if (pin.length === 4) setTimeout(confirmPin, 200);
}
function delKey() {
  pin = pin.slice(0,-1); updateDots();
  document.getElementById('error-msg').textContent = '';
}
function updateDots() {
  for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < pin.length);
}
function confirmPin() {
  if (pin === correct) { openCard(); }
  else {
    document.getElementById('error-msg').textContent = 'รหัสไม่ถูกต้อง ลองใหม่นะ 💙';
    pin = ''; updateDots();
    setTimeout(()=>{ document.getElementById('error-msg').textContent=''; }, 2000);
  }
}

function playNote(freq, dur) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.18, audioCtx.currentTime + 0.05);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur * 0.88);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playNext() {
  if (!isPlaying) return;
  const note = melody[noteIdx];
  playNote(note.f, note.d);
  noteIdx = (noteIdx + 1) % melody.length;
  musicTimer = setTimeout(playNext, note.d * 1000);
}

function toggleMusic() {
  const btn = document.getElementById('play-btn');
  const waves = document.querySelectorAll('.wave-bar');
  if (!isPlaying) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    isPlaying = true; btn.textContent = '⏸';
    waves.forEach(w => w.classList.add('active'));
    playNext();
  } else {
    isPlaying = false; btn.textContent = '▶';
    waves.forEach(w => w.classList.remove('active'));
    clearTimeout(musicTimer);
  }
}

function openCard() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('card-wrap').classList.add('show');
  const inner = document.getElementById('card-inner');

  const stars = [
    {x:7,y:10,s:4,d:0},{x:18,y:4,s:3,d:0.5},{x:68,y:7,s:5,d:1},{x:84,y:14,s:3,d:0.3},
    {x:91,y:5,s:4,d:0.8},{x:4,y:44,s:3,d:1.2},{x:94,y:48,s:4,d:0.6},{x:14,y:78,s:3,d:0.2},
    {x:87,y:83,s:5,d:0.9},{x:50,y:3,s:3,d:0.4},{x:34,y:88,s:4,d:1.1},{x:74,y:86,s:3,d:0.7}
  ];
  const sparks = [
    {x:10,y:28,d:0},{x:24,y:14,d:0.4},{x:79,y:24,d:0.8},{x:89,y:38,d:0.2},
    {x:59,y:9,d:1.0},{x:39,y:86,d:0.6},{x:14,y:63,d:1.3},{x:84,y:68,d:0.9}
  ];
  const sh = stars.map(s=>`<div class="star" style="left:${s.x}%;top:${s.y}%;width:${s.s}px;height:${s.s}px;animation-delay:${s.d}s"></div>`).join('');
  const sp = sparks.map(p=>`<div class="sparkle-star" style="left:${p.x}%;top:${p.y}%;animation-delay:${p.d}s"></div>`).join('');

  inner.innerHTML = `
    ${sh}${sp}
    <div class="animals-row">
      <span class="animal f1">🐶</span>
      <span class="animal f3">⭐</span>
      <span class="animal f2">🐱</span>
      <span class="animal f1">🌟</span>
      <span class="animal f3">🐶</span>
    </div>
    <div class="sparkle-row">✨🐾🌙⭐🐾✨</div>
    <div class="msg-box">
      <span class="msg-highlight">💙 by field eiei 💙</span>
      <p class="msg-body">
        สอบชีวะ ขอให้ได้คะแนนเยอะๆ เลย 🌟<br>
        อย่ากดดันตัวเองนะคับ<br>
        <span class="msg-accent">สู้ๆ 💪</span><br>
        <span class="msg-small">ฟิวเชียร์มิ้นเสมอเลยยย 💙🐾</span>
      </p>
    </div>
    <div class="music-bar">
      <button class="play-btn" id="play-btn" onclick="toggleMusic()">▶</button>
      <div class="music-waves">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
    </div>
    <div class="card-bottom">💙 ฟิวจะ support มิ้นเสมอนะคับ 💙</div>
  `;
}
</script>
</body>
</html>
